name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: jdx/mise-action@5083fe46f0db0d17c4a46080674d3981cf8e538e # v2
        with:
          install: true
          cache: true

      - name: pnpm cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: biome check .

      - name: Typecheck
        run: tsc --noEmit

      - name: Lint (Markdown)
        run: markdownlint-cli2 '**/*.md' '#**/node_modules' '#**/templates'

      - name: Lint (YAML)
        run: yamllint -c .yamllint.yaml .

      - name: Lint (Shell)
        run: shellcheck scripts/*.sh && shfmt -d scripts/

      - name: Lint (TOML)
        run: taplo format --check ./*.toml

      - name: Lint (GitHub Actions)
        run: actionlint

      - name: Security (Gitleaks)
        run: gitleaks detect --no-banner

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
