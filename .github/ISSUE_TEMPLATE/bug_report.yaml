name: Bug Report
description: Report a bug in create-agentic-dev
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      value: |
        1. Run `npm create @ozzylabs/agentic-dev my-app`
        2. Select ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages if applicable.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `npx @ozzylabs/create-agentic-dev --version` or package.json version."
      placeholder: "0.1.0"
    validations:
      required: false
  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: "Output of `node --version`."
      placeholder: "v24.0.0"
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows (WSL2)
        - Windows
    validations:
      required: false
