name: "CD: CDK"

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: cd-cdk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: {{actionsCheckout}}

      - name: Setup mise
        uses: {{actionsMise}}
        with:
          install: "true"
          cache: "true"

      # Required repository variables:
      #   AWS_ROLE_ARN  - IAM role ARN for OIDC authentication
      #   AWS_REGION    - AWS region (e.g., ap-northeast-1)
      # See: https://github.com/aws-actions/configure-aws-credentials
      - name: Configure AWS credentials
        uses: {{actionsAwsCredentials}}
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install infra dependencies
        run: cd infra && pnpm install --frozen-lockfile

      - name: CDK deploy
        run: cd infra && npx cdk deploy --all --require-approval never
