commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json,jsonc}"
      exclude: "{templates,.devcontainer,.copilot,.gemini,.codex,.agents}/**"
      run: biome check --write {staged_files}
      stage_fixed: true
    shellcheck:
      glob: "*.sh"
      run: shellcheck {staged_files}
    shfmt:
      glob: "*.sh"
      run: shfmt -w {staged_files}
      stage_fixed: true
    taplo:
      glob: "*.toml"
      run: taplo format {staged_files}
      stage_fixed: true
    # mdformat: disabled until mdformat-gfm plugin is installed (breaks GFM tables)
    #   glob: "*.md"
    #   run: mdformat {staged_files}
    #   stage_fixed: true
    markdownlint:
      glob: "*.md"
      run: markdownlint-cli2 {staged_files}
    yamlfmt:
      glob: "*.{yaml,yml}"
      run: yamlfmt {staged_files}
      stage_fixed: true
    yamllint:
      glob: "*.{yaml,yml}"
      run: yamllint -c .yamllint.yaml {staged_files}
    actionlint:
      glob: ".github/workflows/*.{yaml,yml}"
      run: actionlint
    gitleaks:
      run: gitleaks protect --staged --no-banner

pre-push:
  commands:
    typecheck:
      run: npx tsc --noEmit
