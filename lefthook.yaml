extends:
  - lefthook-base.yaml

pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json,jsonc}"
      exclude: "{templates,.devcontainer,.copilot,.gemini,.codex,.agents,legacy-stub}/**"
      run: biome check --write {staged_files}
      stage_fixed: true
    actionlint:
      glob: ".github/workflows/*.{yaml,yml}"
      run: actionlint

pre-push:
  commands:
    typecheck:
      run: npx tsc --noEmit
